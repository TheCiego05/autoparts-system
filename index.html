<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoRepuestos Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#dc2626">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}
body{background:#0f172a;color:white;display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:#020617;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.sidebar h2{color:#dc2626;margin-bottom:20px}
.sidebar button{
  background:none;
  border:none;
  color:#cbd5f5;
  padding:12px;
  text-align:left;
  border-radius:8px;
  cursor:pointer;
}
.sidebar button:hover{
  background:#dc2626;
  color:white;
}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column}

/* HEADER */
.header{
  background:#020617;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #1e293b;
}

/* CONTENT */
.content{padding:20px;overflow:auto}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}
.card{
  background:#020617;
  padding:20px;
  border-radius:10px;
  border-left:5px solid #dc2626;
}

/* POS GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:15px;
}
.product{
  background:#020617;
  padding:15px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  border:1px solid #1e293b;
}
.product:hover{background:#dc2626}

/* INPUT */
input{
  padding:10px;
  margin:5px 0;
  width:100%;
  border-radius:6px;
  border:none;
}

/* BUTTON */
.btn{
  background:#dc2626;
  padding:10px;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:6px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>AutoParts</h2>
  <button onclick="view('dashboard')">Dashboard</button>
  <button onclick="view('inventario')">Inventario</button>
  <button onclick="view('pos')">Punto de Venta</button>
  <button onclick="view('historial')">Historial</button>
</div>

<div class="main">

<div class="header">
  <h3 id="empresaNombre">AutoRepuestos Pro</h3>
  <button id="installBtn" class="btn" style="display:none">Instalar</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboard" class="view">
  <div class="cards">
    <div class="card">Ventas: RD$ <span id="ventasHoy">0</span></div>
    <div class="card">Ganancia: RD$ <span id="ganancia">0</span></div>
  </div>
</div>

<!-- INVENTARIO -->
<div id="inventario" class="view" style="display:none;">
  <h3>Nuevo Producto</h3>
  <input id="nombre" placeholder="Nombre">
  <input id="compra" type="number" placeholder="Precio Compra">
  <input id="venta" type="number" placeholder="Precio Venta">
  <button class="btn" onclick="addProducto()">Guardar</button>

  <div id="lista"></div>
</div>

<!-- POS -->
<div id="pos" class="view" style="display:none;">
  <h3>Venta</h3>
  <div class="grid" id="productos"></div>
  <h2>Total RD$ <span id="total">0</span></h2>
  <button class="btn" onclick="finalizar()">Cobrar</button>
</div>

<!-- HISTORIAL -->
<div id="historial" class="view" style="display:none;">
  <div id="ventasLista"></div>
</div>

</div>
</div>

<script>
let productos = JSON.parse(localStorage.getItem('productos')) || [];
let ventas = JSON.parse(localStorage.getItem('ventas')) || [];
let carrito = [];
let total = 0;

// NAV
function view(v){
  document.querySelectorAll('.view').forEach(x=>x.style.display='none');
  document.getElementById(v).style.display='block';
  render();
}

// INVENTARIO
function addProducto(){
  productos.push({
    nombre:nombre.value,
    compra:+compra.value,
    venta:+venta.value
  });
  localStorage.setItem('productos',JSON.stringify(productos));
  render();
}

// RENDER
function render(){
  let lista=document.getElementById('lista');
  let prod=document.getElementById('productos');
  let hist=document.getElementById('ventasLista');

  if(lista) lista.innerHTML='';
  if(prod) prod.innerHTML='';
  if(hist) hist.innerHTML='';

  productos.forEach((p,i)=>{
    if(lista){
      lista.innerHTML+=`<div class="card">${p.nombre} RD$${p.venta}</div>`;
    }

    if(prod){
      prod.innerHTML+=`<div class="product" onclick="addCarrito(${i})">${p.nombre}<br>RD$${p.venta}</div>`;
    }
  });

  ventas.forEach(v=>{
    if(hist){
      hist.innerHTML+=`<div class="card">${v.fecha} RD$${v.total}</div>`;
    }
  });

  document.getElementById('ventasHoy').innerText = ventas.reduce((a,b)=>a+b.total,0);
}

// POS
function addCarrito(i){
  carrito.push(productos[i]);
  total+=productos[i].venta;
  document.getElementById('total').innerText=total;
}

function finalizar(){
  ventas.push({fecha:new Date().toLocaleString(),total});
  localStorage.setItem('ventas',JSON.stringify(ventas));
  carrito=[]; total=0;
  render();
}

// PWA
let deferredPrompt;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    await navigator.serviceWorker.register('./service-worker.js');
  });
}

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'block';
});

installBtn.onclick = async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt = null;
  }
};

render();
</script>

</body>
</html>
