<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoRepuestos Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#dc2626">

<style>
body{margin:0;font-family:Arial;background:#020617;color:white;}
header{background:#dc2626;padding:15px;display:flex;justify-content:space-between;}
.container{display:flex;}
.sidebar{width:220px;background:#111827;height:100vh;padding:10px;}
.sidebar button{width:100%;margin-bottom:10px;padding:10px;background:#1f2937;border:none;color:white;}
.content{flex:1;padding:20px;}
.card{background:#111827;padding:15px;margin-bottom:10px;border-radius:8px;}
input{padding:8px;margin:5px;}
button{padding:8px 12px;background:#dc2626;border:none;color:white;cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.product{background:#1f2937;padding:10px;border-radius:8px;cursor:pointer;text-align:center;}
</style>
</head>

<body>

<header>
  <h2 id="empresaNombre">AutoRepuestos Pro</h2>
  <button id="installBtn" style="display:none">Instalar</button>
</header>

<div class="container">

<div class="sidebar">
  <button onclick="view('dashboard')">Dashboard</button>
  <button onclick="view('inventario')">Inventario</button>
  <button onclick="view('pos')">POS</button>
  <button onclick="view('historial')">Historial</button>
  <button onclick="view('config')">Configuración</button>
</div>

<div class="content">

<div id="dashboard" class="view">
  <div class="card">Ventas Totales: RD$ <span id="ventasHoy">0</span></div>
  <div class="card">Ganancia: RD$ <span id="ganancia">0</span></div>
</div>

<div id="inventario" class="view" style="display:none;">
  <h3>Agregar Producto</h3>
  <input id="nombre" placeholder="Nombre">
  <input id="compra" type="number" placeholder="Precio Compra">
  <input id="venta" type="number" placeholder="Precio Venta">
  <button onclick="addProducto()">Guardar</button>

  <h3>Lista</h3>
  <div id="lista"></div>
</div>

<div id="pos" class="view" style="display:none;">
  <h3>Punto de Venta</h3>
  <div class="grid" id="productos"></div>
  <h3>Total: RD$ <span id="total">0</span></h3>
  <button onclick="finalizar()">Finalizar Venta</button>
</div>

<div id="historial" class="view" style="display:none;">
  <h3>Ventas</h3>
  <div id="ventasLista"></div>
</div>

<div id="config" class="view" style="display:none;">
  <h3>Empresa</h3>
  <input id="empresaInput" placeholder="Nombre negocio">
  <button onclick="guardarEmpresa()">Guardar</button>
</div>

</div>
</div>

<script>
// DATA
let productos = JSON.parse(localStorage.getItem('productos')) || [];
let ventas = JSON.parse(localStorage.getItem('ventas')) || [];
let empresa = localStorage.getItem('empresa') || 'AutoRepuestos Pro';
document.getElementById('empresaNombre').innerText = empresa;

let carrito = [];
let total = 0;

// NAVEGACIÓN
function view(v){
  document.querySelectorAll('.view').forEach(x=>x.style.display='none');
  document.getElementById(v).style.display='block';
  render();
}

// INVENTARIO
function addProducto(){
  let p = {
    nombre: document.getElementById('nombre').value,
    compra: +document.getElementById('compra').value,
    venta: +document.getElementById('venta').value
  };
  productos.push(p);
  localStorage.setItem('productos', JSON.stringify(productos));
  render();
}

// RENDER CORREGIDO
function render(){
  let lista = document.getElementById('lista');
  let productosDiv = document.getElementById('productos');
  let ventasLista = document.getElementById('ventasLista');

  if(lista) lista.innerHTML='';
  if(productosDiv) productosDiv.innerHTML='';
  if(ventasLista) ventasLista.innerHTML='';

  productos.forEach((p,i)=>{
    if(lista){
      lista.innerHTML += `<div class="card">
        ${p.nombre} - Compra: ${p.compra} / Venta: ${p.venta}
      </div>`;
    }

    if(productosDiv){
      productosDiv.innerHTML += `
        <div class="product" onclick="addCarrito(${i})">
          ${p.nombre}<br>RD$ ${p.venta}
        </div>`;
    }
  });

  renderHistorial();
  actualizarDashboard();
}

// CARRITO
function addCarrito(i){
  carrito.push(productos[i]);
  total += productos[i].venta;
  document.getElementById('total').innerText = total;
}

// FINALIZAR VENTA
function finalizar(){
  if(carrito.length===0) return;

  ventas.push({
    fecha: new Date().toLocaleString(),
    items: carrito,
    total
  });

  localStorage.setItem('ventas', JSON.stringify(ventas));

  carrito=[];
  total=0;
  document.getElementById('total').innerText = 0;
  render();
}

// HISTORIAL
function renderHistorial(){
  let ventasLista = document.getElementById('ventasLista');
  if(!ventasLista) return;

  ventasLista.innerHTML='';

  ventas.forEach(v=>{
    ventasLista.innerHTML += `<div class="card">
      ${v.fecha} - RD$ ${v.total}
    </div>`;
  });
}

// DASHBOARD
function actualizarDashboard(){
  let totalVentas = ventas.reduce((a,b)=>a+b.total,0);
  let ganancia = ventas.reduce((a,v)=>{
    return a + v.items.reduce((g,i)=>g+(i.venta-i.compra),0);
  },0);

  let ventasHoy = document.getElementById('ventasHoy');
  let gananciaEl = document.getElementById('ganancia');

  if(ventasHoy) ventasHoy.innerText = totalVentas;
  if(gananciaEl) gananciaEl.innerText = ganancia;
}

// CONFIG
function guardarEmpresa(){
  let val = document.getElementById('empresaInput').value;
  localStorage.setItem('empresa', val);
  location.reload();
}

// PWA
let deferredPrompt;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    await navigator.serviceWorker.register('./service-worker.js');
  });
}

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'block';
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt = null;
  }
});

render();
</script>

</body>
</html>
