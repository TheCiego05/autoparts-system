<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoRepuestos Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#dc2626">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

header{
  background:#dc2626;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container{
  display:flex;
}

.sidebar{
  width:200px;
  background:#111827;
  height:100vh;
  padding:10px;
}

.sidebar button{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  background:#1f2937;
  border:none;
  color:white;
  cursor:pointer;
}

.content{
  flex:1;
  padding:20px;
}

.card{
  background:#111827;
  padding:15px;
  margin-bottom:10px;
  border-radius:8px;
}

input{
  padding:8px;
  margin:5px;
}

button{
  padding:8px 12px;
  background:#dc2626;
  border:none;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h2>AutoRepuestos Pro</h2>
  <button id="installBtn" style="display:none">Instalar</button>
</header>

<div class="container">

<div class="sidebar">
  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('inventario')">Inventario</button>
  <button onclick="show('ventas')">Ventas</button>
</div>

<div class="content">

<div id="dashboard" class="view">
  <div class="card">
    <h3>Total Ventas</h3>
    <p id="totalVentas">RD$ 0</p>
  </div>
</div>

<div id="inventario" class="view" style="display:none;">
  <h3>Agregar Producto</h3>
  <input id="nombre" placeholder="Nombre">
  <input id="precio" type="number" placeholder="Precio">
  <button onclick="agregarProducto()">Guardar</button>

  <h3>Lista</h3>
  <div id="lista"></div>
</div>

<div id="ventas" class="view" style="display:none;">
  <h3>Punto de Venta</h3>
  <div id="productos"></div>
  <h3>Total: RD$ <span id="total">0</span></h3>
</div>

</div>
</div>

<script>
let productos = JSON.parse(localStorage.getItem('productos')) || [];
let total = 0;

// Navegación
function show(v){
  document.querySelectorAll('.view').forEach(x=>x.style.display='none');
  document.getElementById(v).style.display='block';
  render();
}

// Inventario
function agregarProducto(){
  let nombre = document.getElementById('nombre').value;
  let precio = parseFloat(document.getElementById('precio').value);

  productos.push({nombre, precio});
  localStorage.setItem('productos', JSON.stringify(productos));
  render();
}

// Render
function render(){
  let lista = document.getElementById('lista');
  let productosDiv = document.getElementById('productos');

  lista.innerHTML = '';
  productosDiv.innerHTML = '';

  productos.forEach((p,i)=>{
    lista.innerHTML += `
      <div class="card">
        ${p.nombre} - RD$ ${p.precio}
      </div>
    `;

    productosDiv.innerHTML += `
      <button onclick="vender(${p.precio})">
        ${p.nombre} - RD$ ${p.precio}
      </button>
    `;
  });
}

// Ventas
function vender(precio){
  total += precio;
  document.getElementById('total').innerText = total;
  document.getElementById('totalVentas').innerText = 'RD$ ' + total;
}

// PWA
let deferredPrompt;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    await navigator.serviceWorker.register('./service-worker.js');
  });
}

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'block';
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt = null;
  }
});

render();
</script>

</body>
</html>
